[entity-description]
basic-pmr=Converts raw materials into finished goods probabilistically. Feed it precisely — wrong inputs have consequences.
fluid-pmr=Accepts up to 5 different fluids through a single connection, routing each to its own isolated internal storage.
dilithium-reactor-1=A compact reactor that burns Dilithium Fuel Cells to produce steady power. No heat pipes or steam required.
cargo-hatch=Single-item access point to the platform cargo hub. Configure it with one item type; inserters can extract or insert that item through it.
advanced-cargo-hatch=Multi-item access point to the platform cargo hub. Configure up to 4 item types independently; inserters can extract or insert all configured items through it.

[cargo-hatch]
limit-reached=Platform hatch limit reached (__1__/__2__). Research Advanced Cargo Hatch Capacity to increase it.
range-exceeded=Too far from hub (__1__ tiles, max __2__). Research Cargo Hatch Range to extend it.

