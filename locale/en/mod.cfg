[technology-description]
the-reef-discovery=Chart a course to a vast graveyard of alien starships drifting in deep space. Harvest their scrap for raw materials and rare Dilithium Crystals.
the-reef-basic-pmr=Unlocks the Basic Probabilistic Matter Recombinator — a compact machine that converts raw materials directly into finished goods.
the-reef-fluid-pmr=Unlocks the Fluid PMR, a facility that accepts up to 5 different fluids through a single connection and routes each to its own isolated storage.
the-reef-dilithium-science=Synthesize Dilithium Science Packs in the PMR, opening up the full Dilithium Era technology tree.
the-reef-dilithium-reactor-1=Build compact Dilithium Reactors that burn Dilithium Fuel Cells for steady power — no heat pipes, no steam.
the-reef-cargo-hatch=Build Cargo Hatches to route a single item type between inserters and the platform cargo hub. Each platform starts with one hatch slot.
the-reef-advanced-cargo-hatch=Upgrade to the Advanced Cargo Hatch, which supports 4 independently configured item types in a single 2×2 footprint.
the-reef-cargo-hatch-capacity=Increase the number of Cargo Hatches that can be installed on a single space platform by 1.
the-reef-cargo-hatch-range=Extend the maximum placement distance of Cargo Hatches from the platform hub by 5 tiles.
the-reef-ithaca=Locate and chart the artificial station known as Ithaca, deep in the outer Reef.

