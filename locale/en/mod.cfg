[item-description]
starship-scrap-chunk=A chunk of debris recovered from a wrecked alien vessel. Process it in a Crusher.
starship-scrap=Processed debris from alien vessels. Can be recycled for raw materials.
dilithium-crystal=A rare crystalline energy substrate found deep in alien ship cores.
dilithium-fuel-cell=A stable power substrate for Dilithium Reactors. Produced in the PMR.
dilithium-science-pack=An exotic research medium synthesized from Dilithium Crystals and Starship Scrap. Required for all advanced Reef technologies.
dilithium-reactor-1=A compact reactor that burns Dilithium Fuel Cells to produce steady power. No heat pipes or steam required.
basic-pmr=A compact 1x1 machine that converts raw materials directly into finished goods, skipping intermediate crafting steps.
fluid-pmr=A 3x3 facility that accepts up to 5 different fluids through a single connection and routes each to its own isolated storage.

